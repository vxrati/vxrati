<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zee Randomly Made</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    position:relative;
    font-family:'Cormorant Garamond', serif;
}

/* Background Image */
.background{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Text */
.coming-soon{
    position:absolute;
    bottom:20%;
    width:100%;
    text-align:center;
    color:#fdd018;
}

.coming-soon h1{
    font-size:clamp(3rem,7vw,6rem);
    letter-spacing:6px;
    margin-bottom:15px;
}

.coming-soon p{
    font-size:clamp(1rem,2vw,1.6rem);
}

.coming-soon a{
    color:#fdd018;
    text-decoration:none;
    font-weight:700;
}

.coming-soon a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<img src="zeerandomlymadestudio .pdf" alt="Background" class="background">

<div class="coming-soon">
    <h1>COMING SOON</h1>

    <p>
        meanwhile, check out our instagram
        <a href="https://www.instagram.com/zeerandomlymade?igsh=MWVlZWVmOW5ieWU3Mg=="
           target="_blank">
           @zeerandomlymade
        </a>
    </p>
</div>

</body>
</html>
