<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>zeerandomlymade</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* 🔤 Custom font */
@font-face {
    font-family: 'Imaginary Friend';
    src: url('ImaginaryFriend-BB-W00-Regular.ttf') format('truetype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    font-family:'Imaginary Friend', serif;

    /* background */
    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    /* layout system */
    display:flex;
    justify-content:flex-end;   /* pushes content downward */
    align-items:center;
}

/* 🌑 overlay */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.25);
    z-index:0;
}

/* TEXT WRAPPER */
.coming-soon{
    width:100%;
    text-align:center;
    color:#fdd018;
    padding: 0 20px;

    z-index:1;

    /* push into bottom third naturally */
    margin-bottom: 12vh;

    opacity:0;
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
    to { opacity:1; }
}

/* ✨ autosizing text */
.coming-soon h1{
    font-size: clamp(2.2rem, 5vw, 5rem);
    letter-spacing: 5px;
    margin-bottom: 15px;
}

.coming-soon p{
    font-size: clamp(0.95rem, 2.2vw, 1.3rem);
}

.coming-soon a{
    color:#fdd018;
    text-decoration:none;
    font-weight:700;
}

.coming-soon a:hover{
    text-decoration:underline;
}

/* 📱 mobile tuning */
@media (max-width: 768px){
    .coming-soon{
        margin-bottom: 10vh;
    }

    .coming-soon h1{
        font-size: 2.2rem;
    }

    .coming-soon p{
        font-size: 1rem;
    }
}

</style>
</head>

<body>

<div class="coming-soon">
    <h1>COMING SOON</h1>

    <p>
        meanwhile, check out our instagram
        <a href="https://www.instagram.com/zeerandomlymade?igsh=MWVlZWVmOW5ieWU3Mg=="
           target="_blank" rel="noopener noreferrer">
           @zeerandomlymade
        </a>
    </p>
</div>

</body>
</html>
