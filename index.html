<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>zeerandomlymade</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* 🔤 CUSTOM FONT */
@font-face {
    font-family: 'Imaginary Friend';
    src: url('ImaginaryFriend-BB-W00-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;

    font-family: 'Imaginary Friend', serif;

    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* 🌑 overlay for readability */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.25);
    z-index:0;
}

/* MAIN TEXT */
.coming-soon{
    position:absolute;
    left:50%;
    top:70%;
    transform:translate(-50%, -50%);
    width:100%;
    text-align:center;
    color:#fdd018;
    padding: 0 20px;
    z-index:1;

    opacity:0;
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
    to { opacity:1; }
}

.coming-soon h1{
    font-size: clamp(2.2rem, 6vw, 5rem);
    letter-spacing: 5px;
    margin-bottom: 15px;
}

.coming-soon p{
    font-size: clamp(0.95rem, 2.2vw, 1.3rem);
}

.coming-soon a{
    color:#fdd018;
    text-decoration:none;
    font-weight:700;
}

.coming-soon a:hover{
    text-decoration:underline;
}

/* 📱 MOBILE */
@media (max-width: 768px){

    .coming-soon h1{
        font-size: 2.2rem;
        letter-spacing: 3px;
    }

    .coming-soon p{
        font-size: 1rem;
    }
}

/* 📲 TABLET */
@media (max-width: 1024px){

    .coming-soon h1{
        font-size: 3rem;
    }
}

/* 💻 DESKTOP ADJUSTMENT (fix "too high" issue) */
@media (min-width: 1025px){

    .coming-soon{
        top: 55%;
        transform: translate(-50%, -50%);
    }
}

</style>
</head>

<body>

<div class="coming-soon">
    <h1>COMING SOON</h1>

    <p>
        meanwhile, check out our instagram
        <a href="https://www.instagram.com/zeerandomlymade?igsh=MWVlZWVmOW5ieWU3Mg=="
           target="_blank" rel="noopener noreferrer">
           @zeerandomlymade
        </a>
    </p>
</div>

</body>
</html>
