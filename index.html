<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>zeerandomlymade</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* 🔤 FONT */
@font-face {
    font-family: 'Imaginary Friend';
    src: url('ImaginaryFriend-BB-W00-Regular.ttf') format('truetype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;

    font-family:'Imaginary Friend', serif;

    /* 🌄 Background */
    background-image: url("background.jpeg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
}

/* 📱 Mobile background fix (prevents bad cropping focus) */
@media (max-width: 768px){

    body{
        background-size: cover;

        /* SMART CROPPING FOCUS */
        background-position: center 25%;
    }
}

/* 🌑 Overlay for readability */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.28);
    z-index:0;
}

/* 📦 Layout wrapper (bottom third positioning) */
.container{
    position:relative;
    height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom: 16vh; /* bottom-third placement */
    z-index:1;
}

/* ✨ TEXT */
.coming-soon{
    text-align:center;
    color:#fdd018;
    padding: 0 20px;

    opacity:0;
    animation: fadeIn 1.6s ease forwards;
}

@keyframes fadeIn{
    to { opacity:1; }
}

/* 🔤 Autosizing text */
.coming-soon h1{
    font-size: clamp(2.2rem, 5vw, 5rem);
    letter-spacing: 5px;
    margin-bottom: 15px;
}

.coming-soon p{
    font-size: clamp(0.95rem, 2.2vw, 1.3rem);
}

.coming-soon a{
    color:#fdd018;
    text-decoration:none;
    font-weight:700;
}

.coming-soon a:hover{
    text-decoration:underline;
}

/* 📱 Small screen spacing tweak */
@media (max-width: 768px){
    .container{
        padding-bottom: 12vh;
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="coming-soon">
        <h1>COMING SOON</h1>

        <p>
            meanwhile, check out our instagram
            <a href="https://www.instagram.com/zeerandomlymade?igsh=MWVlZWVmOW5ieWU3Mg=="
               target="_blank" rel="noopener noreferrer">
               @zeerandomlymade
            </a>
        </p>
    </div>
</div>

</body>
</html>
